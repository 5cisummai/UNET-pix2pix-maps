data_root: /path/to/pix2pix/maps
output_dir: runs/pix2pix_maps
image_size: 256
load_size: 286
source_interpolation: bicubic
target_interpolation: nearest
batch_size: 1
num_workers: 4
epochs: 200
generator_lr: 0.0002
discriminator_lr: 0.0001
beta1: 0.5
beta2: 0.999
lambda_l1: 100.0
weighted_l1: true
road_mask_threshold: 0.9
road_loss_weight: 5.0
lambda_edge: 0.1
generator_norm: instance
discriminator_norm: instance
weight_decay: 0.0
gradient_clip_norm: 1.0
accumulation_steps: 1
warmup_epochs: null
d_update_interval: 2
save_every: 5
sample_every: 1
patience: 40
no_early_stopping: false
amp: true
seed: 42
source_side: left
resume: null
